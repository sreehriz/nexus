<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#71717a" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b" stop-opacity="1"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="1"/>
    </linearGradient>
  </defs>
  
  <!-- Outer border -->
  <rect x="2" y="2" width="96" height="96" rx="20" fill="url(#bgGrad)" stroke="#27272a" stroke-width="1.5"/>
  
  <!-- Stylized Geometric N / Nexus Icon -->
  <g transform="translate(10, 10)">
    <!-- Main structural lines -->
    <path d="M 20 60 L 20 20 L 60 60 L 60 20" 
          fill="none" 
          stroke="url(#glowGrad)" 
          stroke-width="8" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
    
    <!-- Central connection node indicating networking (Nexus) -->
    <circle cx="40" cy="40" r="5" fill="#06b6d4" filter="drop-shadow(0px 0px 4px rgba(6, 182, 212, 0.8))"/>
  </g>
</svg>
